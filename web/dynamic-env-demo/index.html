<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lensemble Dynamic Env Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.webgpu.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f8;
        color: #15171a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(880px, calc(100vw - 32px));
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 24px;
        align-items: start;
      }

      canvas {
        width: 320px;
        height: 320px;
        image-rendering: pixelated;
        border: 1px solid #c8ced6;
        background: #101820;
      }

      .panel {
        display: grid;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.12;
      }

      .controls {
        display: grid;
        gap: 12px;
        padding: 16px;
        border: 1px solid #cfd5dc;
        background: #ffffff;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        font-weight: 650;
      }

      input[type="range"] {
        width: 100%;
      }

      button,
      input[type="file"]::file-selector-button {
        min-height: 36px;
        border: 1px solid #20242a;
        background: #20242a;
        color: white;
        padding: 0 12px;
        font: inherit;
        cursor: pointer;
      }

      button.secondary {
        background: white;
        color: #20242a;
      }

      #status,
      #metrics,
      .note {
        margin: 0;
        font-size: 13px;
        line-height: 1.45;
        color: #4d5662;
      }

      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
        }

        canvas {
          width: min(100%, 360px);
          height: auto;
          aspect-ratio: 1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <canvas id="env" width="48" height="48" aria-label="Swipe-dot environment"></canvas>
      <section class="panel" aria-label="Controls">
        <h1>Swipe-Dot ONNX Inference</h1>
        <div class="controls">
          <label>
            Model
            <input id="modelFile" type="file" accept=".onnx" />
          </label>
          <label>
            Action X
            <input id="actionX" type="range" min="-1" max="1" step="0.05" value="0.2" />
          </label>
          <label>
            Action Y
            <input id="actionY" type="range" min="-1" max="1" step="0.05" value="-0.1" />
          </label>
          <button id="run" type="button">Step And Predict</button>
          <button id="reset" class="secondary" type="button">Reset</button>
        </div>
        <p id="status" aria-live="polite"></p>
        <p id="metrics" aria-live="polite">state=(0.250, 0.550)</p>
        <p class="note">
          Scope: browser inference and JS/Canvas env-sim only. In-browser training is not claimed.
        </p>
      </section>
    </main>
    <script type="module" src="./app.mjs"></script>
  </body>
</html>
