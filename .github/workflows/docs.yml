# Gate 7 — documentation link-check (07 §8 gate 7).
#
# A build-blocking gate that keeps the corpus' internal cross-references machine-enforced rather than
# aspirational: every relative link `[label](relpath#anchor)` under docs/ (and SPEC.md) must resolve to
# an existing file and, where an #anchor is present, an existing heading under GitHub's heading-slug rule
# (conventions §3). Intra-corpus references only — external (http/https) links are out of scope. The
# checker is pure-stdlib, so this job needs no torch/dependency install.
name: docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  linkcheck:
    name: docs link-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Docs — intra-corpus link check
        run: python scripts/check_docs_links.py docs/ SPEC.md

  site:
    name: docs site build (mkdocs --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # mkdocstrings analyzes the source statically; the CPU torch wheel keeps imports resolvable.
      - name: Install docs deps
        run: |
          pip install "torch>=2.4,<3" --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[docs]"
      # `python -m mkdocs` puts the repo root on sys.path so the config's `!!python/name:docs_slug.slugify`
      # and the `docs_hooks.py` hook resolve.
      - name: Build the site (zero warnings)
        run: python -m mkdocs build --strict
